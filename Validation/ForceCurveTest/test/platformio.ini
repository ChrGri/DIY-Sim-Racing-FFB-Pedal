[env:esp32s3_debug_test]
;platform  = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.30-2/platform-espressif32.zip
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.30-2/platform-espressif32.zip
platform_packages =
    framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.3.0
framework = arduino
board     = esp32-s3-devkitc-1



board_build.f_cpu   = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio

; --- Upload via CH343 UART bridge (adjust COM port if needed) ---
upload_protocol = esptool
upload_port     = COM14

; --- Serial monitor via TinyUSB-CDC (adjust COM port if needed) ---
monitor_port  = COM14
monitor_speed = 115200

; --- Debug via ESP built-in USB-JTAG ---
debug_tool        = esp-builtin
debug_init_break  = tbreak setup
debug_load_mode   = always
build_type        = debug

build_unflags =
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DARDUINO_USB_MODE=0
    -O3

build_flags =
    -O0
    -g3
    -fno-omit-frame-pointer
    ; Keep USB-Serial-JTAG active (no TinyUSB HID takeover)
    -DUSE_TINYUSB=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

debug_extra_cmds =
    monitor reset halt


lib_deps =
    DiyActivePedal_types=symlink://../../../Common_Libs/DiyActivePedal_types
    CubicInterpolatorFloat=symlink://../../../Common_Libs/CubicInterpolatorFloat