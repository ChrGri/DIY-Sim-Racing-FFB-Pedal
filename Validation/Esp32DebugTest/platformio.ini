[env:esp32s3_debug_test]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.30-2/platform-espressif32.zip
framework = arduino
board     = esp32-s3-devkitc-1

board_build.f_cpu   = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio

; --- Upload via CH343 UART bridge (adjust COM port if needed) ---
upload_protocol = esptool
upload_port     = COM12

; --- Serial monitor via TinyUSB-CDC (adjust COM port if needed) ---
monitor_port  = COM12
monitor_speed = 115200

; --- Debug via ESP built-in USB-JTAG ---
debug_tool        = esp-builtin
debug_init_break  = tbreak loop ; break in "loop()" to allow setup() to run and initialize peripherals before halting
debug_speed       = 5000
build_type        = debug

; Commented out to let JTAG flash the chip and reset it safely before the WDT fires
; debug_load_mode   = always 
debug_load_mode = always

build_unflags =
    -Os
    -Og
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DARDUINO_USB_MODE=0
    -O3

build_flags =
    -O0
    -g3
    -ggdb3
    -fno-omit-frame-pointer
    ; Keep USB-Serial-JTAG active (no TinyUSB HID takeover)
    -DUSE_TINYUSB=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; FreeRTOS and Watchdog fixes for OpenOCD
    -D CONFIG_ESP_CONSOLE_USB_CDC=y
    -D CONFIG_ESP_USB_CDC_ENABLED=y
    -D CONFIG_USB_CDC_TRACE=y
    -D CONFIG_FREERTOS_UNICORE=0
    -D CONFIG_ESP_MAIN_TASK_AFFINITIY=0x1
    ; https://community.platformio.org/t/how-to-use-jtag-built-in-debugger-of-the-esp32-s3-in-platformio/36042
    ; https://thingpulse.com/usb-settings-for-logging-with-the-esp32-s3-in-platformio/
    ; https://warped3.substack.com/p/how-to-debug-esp32s3-devkitc-1-using
