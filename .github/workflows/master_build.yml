name: Master Build & Release

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch: # Erlaubt dir, die Action auch manuell über den "Run workflow" Button zu starten

jobs:
  build-and-release:
    runs-on: windows-latest # Zwingend Windows für MSBuild und die .bat Datei
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # --- 1. PlatformIO Setup ---
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install PlatformIO
        run: pip install --upgrade platformio

      # --- 2. MSBuild & NuGet Setup ---
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1.0.5

      # --- 3. SimHub Referenzen vorbereiten ---
      - name: Download & Extract SimHub Requirements
        run: | 
          # Nur noch SimHub herunterladen (kein altes innounp mehr nötig!)
          aria2c -j1 -o SimHub.zip "https://github.com/SHWotever/SimHub/releases/download/9.11.12/SimHub.9.11.12.zip"
          7z x SimHub.zip
          
          # Modernes innoextract über Chocolatey installieren (dauert nur wenige Sekunden)
          choco install innoextract -y
          
          # Installer finden
          $installer = Get-ChildItem -Filter SimHubSetup_*.exe | Select-Object -First 1
          Write-Host "Gefundener Installer: $($installer.Name)"
          
          # Mit innoextract entpacken
          innoextract $installer.Name -d "C:\Program Files (x86)\SimHub\"
          
          # innoextract packt die Dateien standardmäßig in einen Unterordner "app". 
          # Wir verschieben sie eine Ebene nach oben, damit MSBuild sie sofort findet.
          if (Test-Path "C:\Program Files (x86)\SimHub\app") {
              Move-Item -Path "C:\Program Files (x86)\SimHub\app\*" -Destination "C:\Program Files (x86)\SimHub\" -Force
          }

      - name: Restore NuGet Packages
        run: nuget restore "SimHubPlugin/User.PluginSdkDemo.sln"

      # --- 4. Ausführen deines Master Batch Skripts ---
      - name: Run Master Build Script
        # Das Skript baut alle ESPs und am Ende die DLL (wobei es intern copy_firmwares.bat aufruft)
        run: cmd /c build_everything.bat

      # --- 5. Dynamischen Release-Namen generieren (Datum & Uhrzeit) ---
      - name: Generate Version Date
        id: date
        run: echo "date=$(Get-Date -Format 'yyyyMMdd.HHmmss')" >> $env:GITHUB_OUTPUT

      # Speichert IMMER ein Artefakt zum Testen
      - name: Upload DLL as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiyActivePedal-DLL
          path: SimHubPlugin/bin/Release/DiyActivePedal.dll

      # Macht NUR ein echtes Release, wenn der Branch "main" ist
      - name: Create Public Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: Build_${{ steps.date.outputs.date }}
          name: Official Release ${{ steps.date.outputs.date }}
          files: SimHubPlugin/bin/Release/DiyActivePedal.dll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}