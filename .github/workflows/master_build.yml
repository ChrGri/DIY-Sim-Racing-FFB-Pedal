name: Master Build & Release

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch: # Erlaubt dir, die Action auch manuell über den "Run workflow" Button zu starten

jobs:
  build-and-release:
    runs-on: windows-latest # Zwingend Windows für MSBuild und die .bat Datei
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # --- 1. PlatformIO Setup ---
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install PlatformIO
        run: pip install --upgrade platformio

      # --- 2. MSBuild & NuGet Setup ---
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1.0.5

      # --- 3. SimHub Referenzen vorbereiten ---
      - name: Download & Extract SimHub Requirements
        run: | 
          aria2c -j1 -o SimHub.zip "https://github.com/SHWotever/SimHub/releases/download/9.11.12/SimHub.9.11.12.zip"
          7z x SimHub.zip
          
          # Installer finden
          $installer = Get-ChildItem -Filter SimHubSetup_*.exe | Select-Object -First 1
          Write-Host "Gefundener Installer: $($installer.Name)"
          
          # Führe das echte Setup lautlos (ohne UI) aus und installiere es in den Zielordner
          Write-Host "Installiere SimHub lautlos... (das dauert ein paar Sekunden)"
          Start-Process -FilePath $installer.FullName -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /DIR=`"C:\Program Files (x86)\SimHub`"" -Wait -NoNewWindow
          
          Write-Host "Installation abgeschlossen!"

      - name: Restore NuGet Packages
        run: nuget restore "SimHubPlugin/DiyFfbPedal.sln"

      # --- 4. Ausführen deines Master Batch Skripts ---
      - name: Run Master Build Script
        # Das Skript baut alle ESPs und am Ende die DLL (wobei es intern copy_firmwares.bat aufruft)
        run: cmd /c build_everything.bat

      # --- 5. Release-Version aus verisonDefines.txt auslesen ---
      - name: Extract Version
        id: version
        run: |
          $ver = (Get-Content CommonResources\verisonDefines.txt -First 1).Replace('"', '').Trim()
          echo "Extracted version: $ver"
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      # --- Neu: Wir kopieren die DLL in einen sauberen Ordner, um die Unterordner loszuwerden ---
      - name: Prepare Artifact Folder
        run: |
          mkdir Staging
          # Sucht die DLL (egal ob in bin oder obj) und kopiert sie direkt in den "Staging"-Ordner
          Get-ChildItem -Path SimHubPlugin -Filter DiyFfbPedal.dll -Recurse | Select-Object -First 1 | Copy-Item -Destination Staging\

      # Speichert IMMER ein Artefakt zum Testen (jetzt flach und ohne Unterordner)
      - name: Upload DLL as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiyFfbPedal-DLL
          path: Staging/

      # Macht NUR ein echtes Release, wenn der Branch "main" ist
      - name: Create Public Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: Build_${{ steps.version.outputs.version }}
          name: Official Release ${{ steps.version.outputs.version }}
          # Wir greifen jetzt einfach auf die Datei im Staging-Ordner zu!
          files: Staging/DiyFfbPedal.dll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}