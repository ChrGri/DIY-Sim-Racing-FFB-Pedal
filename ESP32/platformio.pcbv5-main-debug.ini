[env:esp32s3usbotg_pcbV5_without_espnow_debug]
board = esp32-s3-devkitc-1
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
upload_protocol = esptool

; Keep these aligned with the current PCB V5 port assignment.
upload_port = COM12
monitor_port = COM12

debug_tool = esp-builtin
debug_init_break = tbreak setup
debug_load_mode = always
debug_speed = 5000
build_type = debug

; Compile the real firmware, but keep the temporary probe source out of this env.
build_src_filter =
    +<*>
    -<DebugJtagProbeMain.cpp>

build_unflags =
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DARDUINO_USB_MODE=0
	-O3
	-O2
	-Os
	-Og

build_flags =
	-UCONFIG_ESP_TIMER_SOURCE_APB
	-DCONFIG_ESP_TIMER_SOURCE_XTAL=1
	-O0
	-g3
	-mtext-section-literals
	-fno-omit-frame-pointer
	-DUSE_TINYUSB=0
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DPCB_VERSION=12
	-DDEBUG_KEEP_USB_SERIAL_JTAG

lib_deps =
	${common.lib_deps_external}
	adafruit/Adafruit MCP4725 @ ^2.0.2
	https://github.com/tcfshcrw/ESPNowW.git
	https://github.com/mikalhart/ESP32-OTA-Pull.git
	bblanchon/ArduinoJson@^7.2.0
	adafruit/Adafruit TinyUSB Library
	https://github.com/ChrGri/ADS1255-ADS1256.git
	https://github.com/tcfshcrw/Joystick_ESP32S3.git