[env:ControlBoard_V7_without_espnow]
board = esp32-s3-devkitc-1
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = dio
board_upload.flash_size = 4MB
board_build.partitions = min_spiffs.csv
upload_protocol = esptool
; upload_port = COM23
build_unflags = 
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DARDUINO_USB_MODE=0
	-DARDUINO_USB_MODE=1
build_flags = 
	-O3 # compiler optimization for runtime 
	-DARDUINO_RUNNING_CORE=0
	-DCORE_DEBUG_LEVEL=0
	-DUSE_TINYUSB=1
	-DARDUINO_USB_MODE=0 ; 0: UsbOTG   1: Hardware CDC/JTAG   
	-DARDUINO_USB_CDC_ON_BOOT=0 ; 1: necessary for HID output to work. Using Serial1 for UART serial output.
	-DPCB_VERSION=14

; lib_archive = no
; lib_ignore = USB
; 1200bps touch enabled. Firmware blocks the reboot for the first 5s after boot (see
; miscTask) so the Windows CDC driver's initial SET_LINE_CODING@1200bps is ignored.
; After 5s, reboot is unlocked and esptool triggers it normally.
; Workflow: power on → wait ~5s → click Upload (no button presses needed).
board_upload.use_1200bps_touch = yes
board_upload.wait_for_upload_port = yes
board_upload.require_upload_port = yes
lib_deps = 
	${common.lib_deps_external}
	adafruit/Adafruit MCP4725 @ ^2.0.2
	https://github.com/tcfshcrw/ESPNowW.git
	https://github.com/mikalhart/ESP32-OTA-Pull.git
	https://github.com/wollewald/ADS1220_WE.git
	bblanchon/ArduinoJson@^7.2.0