[env:ControlBoard_V7_without_espnow]
board = esp32-s3-devkitc-1
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = dio
board_upload.flash_size = 4MB
board_build.partitions = min_spiffs.csv
upload_protocol = esptool
upload_port = COM23
build_unflags = 
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DARDUINO_USB_MODE=0
	-DARDUINO_USB_MODE=1
build_flags = 
	-O3 # compiler optimization for runtime 
	-DARDUINO_RUNNING_CORE=1
	-DCORE_DEBUG_LEVEL=0
	-DUSE_TINYUSB=1
	-DARDUINO_USB_MODE=0 ; 0: UsbOTG   1: Hardware CDC/JTAG   
	-DARDUINO_USB_CDC_ON_BOOT=1 ; 1: necessary for HID output to work. Using Serial1 for UART serial output.
	-DPCB_VERSION=14
	-DCFG_TUD_CDC_TX_BUFSIZE=16384 ; TinyUSB CDC TX ring buffer.
	                                ; 16 KB comfortably holds the max txBatch (60 × ~110 B = 6600 B)
	                                ; so ActiveSerial->write() never truncates a full batch.
; lib_archive = no
; lib_ignore = USB
; 1200bps touch disabled: Serial.enableReboot(false) is set, so the device will not
; restart on SET_LINE_CODING@1200bps. To flash: hold BOOT, press+release RESET, release BOOT,
; then click Upload in PlatformIO.
board_upload.use_1200bps_touch = no
board_upload.wait_for_upload_port = yes
board_upload.require_upload_port = yes
lib_deps = 
	${common.lib_deps_external}
	adafruit/Adafruit TinyUSB Library
	adafruit/Adafruit MCP4725 @ ^2.0.2
	https://github.com/tcfshcrw/ESPNowW.git
	https://github.com/mikalhart/ESP32-OTA-Pull.git
	https://github.com/wollewald/ADS1220_WE.git
	bblanchon/ArduinoJson@^7.2.0
	https://github.com/tcfshcrw/Joystick_ESP32S3.git