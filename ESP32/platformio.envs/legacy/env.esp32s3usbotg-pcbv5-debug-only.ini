; Standalone PlatformIO config for isolated PCB V5 debug testing
; Usage examples:
;   pio run -c platformio.pcbv5-debug-only.ini -e esp32s3usbotg_pcbV5_without_espnow_debug
;   pio run -c platformio.pcbv5-debug-only.ini -e esp32s3usbotg_pcbV5_without_espnow_debug -t upload
;   pio debug -c platformio.pcbv5-debug-only.ini -e esp32s3usbotg_pcbV5_without_espnow_debug

[platformio]
; Do not set default_envs here. This file is included via extra_configs and
; should not override the workspace-wide default environment.

[env:esp32s3usbotg_pcbV5_sameproject_jtag_probe]
framework = arduino
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.30-2/platform-espressif32.zip
platform_packages =
    framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.3.0

board = esp32-s3-devkitc-1
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio

upload_protocol = esptool
upload_port = COM11
monitor_port = COM5
monitor_speed = 115200

build_type = debug
debug_tool = esp-builtin
debug_init_break = tbreak setup
debug_load_mode = always
debug_speed = 5000
build_src_filter =
    -<*>
    +<DebugJtagProbeMain.cpp>

build_unflags =
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DARDUINO_USB_MODE=0
    -O3
    -O2
    -Os
    -Og

build_flags =
    -O0
    -g3
    -fno-omit-frame-pointer
    -DUSE_TINYUSB=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
