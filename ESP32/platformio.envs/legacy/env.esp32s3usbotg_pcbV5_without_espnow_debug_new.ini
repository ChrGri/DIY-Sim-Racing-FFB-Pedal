; https://community.platformio.org/t/how-to-use-jtag-built-in-debugger-of-the-esp32-s3-in-platformio/36042
; https://thingpulse.com/usb-settings-for-logging-with-the-esp32-s3-in-platformio/
; https://warped3.substack.com/p/how-to-debug-esp32s3-devkitc-1-using



[env:esp32s3usbotg_pcbV5_without_espnow_debug_new]
framework = arduino
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.30-2/platform-espressif32.zip
platform_packages =
    framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.3.0

board = esp32-s3-devkitc-1
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
upload_protocol = esptool

; Keep these aligned with the current PCB V5 port assignment.
upload_port = COM12
monitor_port = COM12

; --- Debug Configuration ---
build_type = debug
debug_tool = esp-builtin
debug_speed = 5000

; Wir attachen an den laufenden Chip!
debug_load_mode = manual 
debug_init_break =        ; Leer lassen! Wir nutzen einen manuellen Breakpoint.

; Compile the real firmware, but keep the temporary probe source out of this env.
build_src_filter =
    +<*>
    -<DebugJtagProbeMain.cpp>

build_unflags =
    -O3
    -O2
    -Os
    -Og

build_flags =
    -UCONFIG_ESP_TIMER_SOURCE_APB
    -DCONFIG_ESP_TIMER_SOURCE_XTAL=1
    -O0
    -g3
    -mtext-section-literals
    -fno-omit-frame-pointer
    -DUSE_TINYUSB=0
    -DPCB_VERSION=12
    -DDEBUG_KEEP_USB_SERIAL_JTAG
    ; --- FreeRTOS Fixes (Nur diese beiden behalten!) ---
    -D CONFIG_FREERTOS_UNICORE=0
    -D CONFIG_ESP_MAIN_TASK_AFFINITIY=0x1

lib_deps =
    ${common.lib_deps_external}
    adafruit/Adafruit MCP4725 @ ^2.0.2
    https://github.com/tcfshcrw/ESPNowW.git
    https://github.com/mikalhart/ESP32-OTA-Pull.git
    bblanchon/ArduinoJson@^7.2.0
    https://github.com/ChrGri/ADS1255-ADS1256.git
